<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 180px;
      height: 180px;
      background: transparent;
    }
    .icon {
      width: 180px;
      height: 180px;
      background-image: url('favicon-square.png');
      background-size: cover;
      /* iOS uses approximately 22.5% border radius for squircle effect */
      border-radius: 40px; /* 22.2% of 180px */
    }
  </style>
</head>
<body>
  <div class="icon"></div>
</body>
</html>
