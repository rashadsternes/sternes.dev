<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image 3A - Sternes.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      display: flex;
    }
    .left-section {
      width: 480px;
      height: 630px;
      background: linear-gradient(135deg, #2D4A3E 0%, #234134 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .pattern {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0.1;
    }
    .pattern-circle {
      position: absolute;
      border-radius: 50%;
      background: #FFFFFF;
    }
    .circle-1 {
      width: 120px;
      height: 120px;
      top: 80px;
      left: 50px;
      opacity: 0.15;
    }
    .circle-2 {
      width: 80px;
      height: 80px;
      bottom: 120px;
      right: 60px;
      opacity: 0.1;
    }
    .circle-3 {
      width: 60px;
      height: 60px;
      top: 400px;
      left: 100px;
      opacity: 0.08;
    }
    .brand {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 48px;
      color: #FFFFFF;
      letter-spacing: 2px;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .right-section {
      width: 720px;
      height: 630px;
      background: #FEFEFE;
      padding: 180px 60px 60px 60px;
      display: flex;
      flex-direction: column;
    }
    .headline {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 64px;
      color: #2D4A3E;
      line-height: 1.1;
      margin-bottom: 50px;
    }
    .body-text {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 30px;
      color: #555555;
      line-height: 1.5;
      max-width: 580px;
    }
  </style>
</head>
<body>
  <div class="left-section">
    <div class="pattern">
      <div class="pattern-circle circle-1"></div>
      <div class="pattern-circle circle-2"></div>
      <div class="pattern-circle circle-3"></div>
    </div>
    <div class="brand">STERNES.DEV</div>
  </div>
  <div class="right-section">
    <div class="headline">
      Website Design<br>That Works
    </div>
    <div class="body-text">
      Beautiful websites that attract customers and grow your business
    </div>
  </div>
</body>
</html>
