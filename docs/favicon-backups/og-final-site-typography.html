<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image - Site Typography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,200;0,400;1,200&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      position: relative;
      background-image: url('canva-background.png');
      background-size: cover;
      background-position: center;
    }
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 100px 80px;
      display: flex;
      flex-direction: column;
    }
    /* Eyebrow label - matching "HOW I HELP" style */
    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 40px;
      font-weight: 400;
    }
    /* Brand name - ultra light Fraunces like site */
    .brand {
      font-family: 'Fraunces', serif;
      font-weight: 200;
      font-size: 42px;
      color: #111;
      letter-spacing: -0.01em;
      margin-bottom: 70px;
      text-transform: uppercase;
    }
    /* Headline - matching the "Going beneath the surface" style exactly */
    .headline {
      font-family: 'Fraunces', serif;
      font-weight: 200;
      font-size: 56px;
      color: #111;
      line-height: 1.15;
      margin-bottom: 50px;
      max-width: 580px;
      letter-spacing: -0.01em;
    }
    /* Italic accent part - matching "to get clear on what you really need" */
    .headline-accent {
      font-style: italic;
      color: #555;
    }
    /* Body text - matching site body style */
    .body-text {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 20px;
      color: #444;
      line-height: 1.6;
      max-width: 550px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="eyebrow">Website Design</div>
    <div class="brand">STERNES.DEV</div>
    <h2 class="headline">
      Modern websites<br>
      <span class="headline-accent">that make your business look its best</span>
    </h2>
  </div>
</body>
</html>
